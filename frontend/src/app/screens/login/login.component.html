<div class="login-page">
  <div class="login-card">
    <div class="login-logo">⚡</div>
    <h1 class="login-title">RiskManagement Pro</h1>
    <p class="login-subtitle">Enterprise Risk Assessment Platform</p>
    <div class="login-divider"></div>
    <form (ngSubmit)="login()" class="login-form" autocomplete="off">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" aria-label="Email Address" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" aria-label="Password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>
      <div class="error-msg" *ngIf="error">{{ error }}</div>
      <button type="submit" class="btn-primary btn-full" [disabled]="loading">
        <span *ngIf="!loading">Sign In →</span>
        <span *ngIf="loading">Signing in...</span>
      </button>
    </form>
    <p class="login-hint">Contact your administrator if you need access.</p>
  </div>
</div>
