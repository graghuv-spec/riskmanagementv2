<div class="page-header">
  <h1>Portfolio Analytics</h1>
  <p>Exposure, risk trends, and default predictions across the portfolio</p>
</div>

<div *ngIf="loading" class="loading-wrap"><div class="spinner"></div></div>

<ng-container *ngIf="!loading">
  <div class="charts-grid">
    <div class="card chart-card">
      <div class="section-title">Sector Exposure (Loan Value)</div>
      <div class="chart-wrap"><canvas #sectorChart></canvas></div>
    </div>
    <div class="card chart-card">
      <div class="section-title">Regional Exposure (Loan Count)</div>
      <div class="chart-wrap"><canvas #regionChart></canvas></div>
    </div>
    <div class="card chart-card">
      <div class="section-title">Risk Score Trend Over Time</div>
      <div class="chart-wrap"><canvas #trendChart></canvas></div>
    </div>
    <div class="card chart-card">
      <div class="section-title">Predicted Default Rate Trend</div>
      <div class="chart-wrap"><canvas #defaultChart></canvas></div>
    </div>
  </div>
</ng-container>
