server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # ── Angular SPA routing ───────────────────────────────────────────────────
    # Return index.html for every route so Angular's router handles navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: REST API ───────────────────────────────────────────────────────
    # "backend" resolves to the backend container on the Docker network.
    # Requests from the browser to /api/** are forwarded to Spring Boot.
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Proxy: GraphQL endpoint ───────────────────────────────────────────────
    location /graphql {
        proxy_pass         http://backend:8080/graphql;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Proxy: GraphiQL playground ────────────────────────────────────────────
    location /graphiql {
        proxy_pass         http://backend:8080/graphiql;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;
    gzip_min_length 1024;
}
