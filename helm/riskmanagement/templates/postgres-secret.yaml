{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "riskmanagement.postgresName" . }}-secret
  labels:
    {{- include "riskmanagement.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ required "Set postgres.auth.username in values" .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ required "Set postgres.auth.password in values" .Values.postgres.auth.password | quote }}
  POSTGRES_DB: {{ required "Set postgres.auth.database in values" .Values.postgres.auth.database | quote }}
{{- end }}
