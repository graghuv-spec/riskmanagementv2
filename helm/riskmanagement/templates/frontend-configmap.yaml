apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "riskmanagement.frontendName" . }}-config
  labels:
    {{- include "riskmanagement.labels" . | nindent 4 }}
data:
  BACKEND_URL: {{ default (printf "http://%s:%v" (include "riskmanagement.backendName" .) .Values.backend.service.port) .Values.frontend.env.backendUrl | quote }}
