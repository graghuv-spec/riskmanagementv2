spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      # Ensures the riskmanagement schema exists before Hibernate runs DDL.
      # Required for Cloud SQL (and any fresh PostgreSQL instance) where the
      # schema is not pre-created.  The statement is idempotent.
      connection-init-sql: "CREATE SCHEMA IF NOT EXISTS riskmanagement"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: riskmanagement
  graphql:
    graphiql:
      enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.schema: DEBUG

# CORS allowed origins. Override via ALLOWED_ORIGINS env var when needed.
# Comma-separated list of origin patterns.
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:*}
  risk:
    income-stability-weight: ${RISK_INCOME_STABILITY_WEIGHT:0.3}
    repayment-history-weight: ${RISK_REPAYMENT_HISTORY_WEIGHT:0.3}
    collateral-ratio-weight: ${RISK_COLLATERAL_RATIO_WEIGHT:0.2}
    sector-risk-weight: ${RISK_SECTOR_RISK_WEIGHT:0.1}
    location-risk-weight: ${RISK_LOCATION_RISK_WEIGHT:0.1}
    min-score: ${RISK_MIN_SCORE:0}
    max-score: ${RISK_MAX_SCORE:100}
    pd-divisor: ${RISK_PD_DIVISOR:10}
    pd-offset: ${RISK_PD_OFFSET:5}
    recommended-limit-income-multiplier: ${RISK_RECOMMENDED_LIMIT_INCOME_MULTIPLIER:0.5}
    model-version: ${RISK_MODEL_VERSION:Rule-Based v1}
    explanation-json: '${RISK_EXPLANATION_JSON:{"method":"rule-based"}}'
    sector-technology-score: ${RISK_SECTOR_TECHNOLOGY_SCORE:90}
    sector-finance-score: ${RISK_SECTOR_FINANCE_SCORE:80}
    sector-agriculture-score: ${RISK_SECTOR_AGRICULTURE_SCORE:60}
    sector-default-score: ${RISK_SECTOR_DEFAULT_SCORE:70}
    default-regional-score: ${RISK_DEFAULT_REGIONAL_SCORE:75}
    grade-a-threshold: ${RISK_GRADE_A_THRESHOLD:80}
    grade-b-threshold: ${RISK_GRADE_B_THRESHOLD:60}
    grade-c-threshold: ${RISK_GRADE_C_THRESHOLD:40}
  seed:
    enabled: ${SEED_ENABLED:false}
    reset-before-seed: ${SEED_RESET_BEFORE_SEED:false}
    expected-user-count: ${SEED_EXPECTED_USER_COUNT:0}
    institution-name: ${SEED_INSTITUTION_NAME:}
    institution-license-number: ${SEED_INSTITUTION_LICENSE_NUMBER:}
    institution-contact-email: ${SEED_INSTITUTION_CONTACT_EMAIL:}
    institution-subscription-plan: ${SEED_INSTITUTION_SUBSCRIPTION_PLAN:}
    admin-user:
      name: ${SEED_ADMIN_NAME:}
      email: ${SEED_ADMIN_EMAIL:}
      role: ${SEED_ADMIN_ROLE:}
      mfa-enabled: ${SEED_ADMIN_MFA_ENABLED:true}
    officer-user:
      name: ${SEED_OFFICER_NAME:}
      email: ${SEED_OFFICER_EMAIL:}
      role: ${SEED_OFFICER_ROLE:}
      mfa-enabled: ${SEED_OFFICER_MFA_ENABLED:false}
    default-user-password: ${SEED_DEFAULT_USER_PASSWORD:}
    default-audit-ip: ${SEED_DEFAULT_AUDIT_IP:}
    audit-lookback-days: ${SEED_AUDIT_LOOKBACK_DAYS:30}
