spring:
  datasource:
    # Override DB_URL via environment variable when needed.
    # The fallback below (sslmode=disable) is for local development.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres?stringtype=unspecified&sslmode=disable&currentSchema=riskmanagement}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      # Ensures the riskmanagement schema exists before Hibernate runs DDL.
      # Required for Cloud SQL (and any fresh PostgreSQL instance) where the
      # schema is not pre-created.  The statement is idempotent.
      connection-init-sql: "CREATE SCHEMA IF NOT EXISTS riskmanagement"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: riskmanagement
  graphql:
    graphiql:
      enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.schema: DEBUG

# CORS allowed origins. Override via ALLOWED_ORIGINS env var when needed.
# Comma-separated list of origin patterns.
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200,http://localhost}
