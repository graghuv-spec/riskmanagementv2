spring:
  datasource:
    # Separate schema keeps test data isolated from the main riskmanagement schema
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres?stringtype=unspecified&sslmode=disable&currentSchema=riskmanagement_test}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS riskmanagement_test
  jpa:
    hibernate:
      ddl-auto: create-drop    # wipe and recreate schema on each test run
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: riskmanagement_test
        hbm2ddl.create_namespaces: true
  graphql:
    graphiql:
      enabled: false

logging:
  level:
    org.hibernate.SQL: WARN
    com.riskmanagement: DEBUG
