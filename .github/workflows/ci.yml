name: CI

# ──────────────────────────────────────────────────────────────────────────────
# Trigger on every push and pull-request on any branch.
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ['**']
  pull_request:

# Minimal default: read-only.  Jobs that need more override below.
permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  # --------------------------------------------------------------------------
  # DB_PASSWORD is stored as a GitHub Actions Secret (repo Settings → Secrets →
  # Actions → New repository secret → Name: DB_PASSWORD).
  # Falls back to 'admin' so forks and first-run work without configuration.
  # The main application.yml and application-test.yml both read ${DB_PASSWORD}.
  # --------------------------------------------------------------------------
  DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'admin' }}
  DB_USERNAME: postgres
  POSTGRES_DB: postgres

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # 1. FRONTEND COMPILATION
  # ────────────────────────────────────────────────────────────────────────────
  compile-frontend:
    name: "Compile — Frontend (ng build)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Compile (production build)
        run: npx ng build --configuration production
        working-directory: frontend

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ────────────────────────────────────────────────────────────────────────────
  # 2. BACKEND COMPILATION
  # ────────────────────────────────────────────────────────────────────────────
  compile-backend:
    name: "Compile — Backend (Gradle)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew
        working-directory: backend

      - name: Compile main + test sources
        run: ./gradlew compileJava compileTestJava --no-daemon
        working-directory: backend

  # ────────────────────────────────────────────────────────────────────────────
  # 3. BACKEND INTEGRATION TESTS
  #
  # Spring profile: test  → application-test.yml
  # Schema used:          riskmanagement_test  (isolated from production schema)
  # ddl-auto:             create-drop          (clean slate every run)
  # ────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: "Integration Tests — Backend (JUnit + Spring)"
    runs-on: ubuntu-latest
    needs: [compile-frontend, compile-backend]

    permissions:
      contents: read
      checks: write
      pull-requests: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew
        working-directory: backend

      - name: Create riskmanagement_test schema
        run: |
          PGPASSWORD=${{ env.DB_PASSWORD }} psql \
            -h localhost -U ${{ env.DB_USERNAME }} \
            -c "CREATE SCHEMA IF NOT EXISTS riskmanagement_test;"

      - name: Run integration tests
        run: ./gradlew test --no-daemon
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          # DB_URL default in application-test.yml points to riskmanagement_test schema

      - name: Upload JUnit HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/build/reports/tests/test/
          retention-days: 7

      - name: Annotate PR with test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Integration Tests
          path: backend/build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  # 4. PLAYWRIGHT E2E TESTS
  #
  # Spring profile: default → application.yml
  # Schema used:            riskmanagement     (the real app schema)
  # DataInitializer seeds demo data on first start.
  # ────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "E2E Tests — Playwright (Chromium)"
    runs-on: ubuntu-latest
    needs: [integration-tests]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Java + backend ──────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew
        working-directory: backend

      - name: Create riskmanagement schema
        run: |
          PGPASSWORD=${{ env.DB_PASSWORD }} psql \
            -h localhost -U ${{ env.DB_USERNAME }} \
            -c "CREATE SCHEMA IF NOT EXISTS riskmanagement;"

      - name: Start backend (background)
        run: ./gradlew bootRun --no-daemon &
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: default
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_USERNAME: ${{ env.DB_USERNAME }}

      - name: Wait for backend to be ready (port 8080)
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/api/loans > /dev/null 2>&1; then
              echo "Backend is up after ${i} attempts."; exit 0
            fi
            echo "  attempt $i — sleeping 5s"; sleep 5
          done
          echo "Backend did not start in time!" && exit 1

      # ── Node + frontend ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start Angular dev server (background)
        run: npx ng serve --port 4200 &
        working-directory: frontend

      - name: Wait for Angular dev server to be ready (port 4200)
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4200 > /dev/null 2>&1; then
              echo "Frontend is up after ${i} attempts."; exit 0
            fi
            echo "  attempt $i — sleeping 5s"; sleep 5
          done
          echo "Angular dev server did not start in time!" && exit 1

      # ── Run tests ────────────────────────────────────────────────────────────
      - name: Run Playwright E2E tests
        run: npx playwright test
        working-directory: frontend
        env:
          CI: true

      # ── Artefacts ────────────────────────────────────────────────────────────
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces / screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

