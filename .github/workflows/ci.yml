name: CI

# ──────────────────────────────────────────────────────────────────────────────
# Trigger on every push and pull-request on any branch.
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ['**']
  pull_request:

# Minimal default: read-only.  Jobs that need more override below.
permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  # --------------------------------------------------------------------------
  # DB_PASSWORD is stored as a GitHub Actions Secret (repo Settings → Secrets →
  # Actions → New repository secret → Name: DB_PASSWORD).
  # Falls back to 'admin' so forks and first-run work without configuration.
  # The main application.yml and application-test.yml both read ${DB_PASSWORD}.
  # --------------------------------------------------------------------------
  DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'admin' }}
  DB_USERNAME: postgres
  POSTGRES_DB: postgres

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # 1. FRONTEND COMPILATION
  # ────────────────────────────────────────────────────────────────────────────
  compile-frontend:
    name: "Compile — Frontend (ng build)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Compile (production build)
        run: npx ng build --configuration production
        working-directory: frontend

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ────────────────────────────────────────────────────────────────────────────
  # 2. BACKEND COMPILATION
  # ────────────────────────────────────────────────────────────────────────────
  compile-backend:
    name: "Compile — Backend (Gradle)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew
        working-directory: backend

      - name: Compile main + test sources
        run: ./gradlew compileJava compileTestJava --no-daemon
        working-directory: backend

  # ────────────────────────────────────────────────────────────────────────────
  # 3. BACKEND INTEGRATION TESTS
  #
  # Spring profile: test  → application-test.yml
  # Schema used:          riskmanagement_test  (isolated from production schema)
  # ddl-auto:             create-drop          (clean slate every run)
  # ────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: "Integration Tests — Backend (JUnit + Spring)"
    runs-on: ubuntu-latest
    needs: [compile-frontend, compile-backend]

    permissions:
      contents: read
      checks: write
      pull-requests: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew
        working-directory: backend

      - name: Create riskmanagement_test schema
        run: |
          PGPASSWORD=${{ env.DB_PASSWORD }} psql \
            -h localhost -U ${{ env.DB_USERNAME }} \
            -c "CREATE SCHEMA IF NOT EXISTS riskmanagement_test;"

      - name: Run integration tests
        run: ./gradlew test --no-daemon
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_USERNAME: ${{ env.DB_USERNAME }}
          # DB_URL default in application-test.yml points to riskmanagement_test schema

      - name: Upload JUnit HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/build/reports/tests/test/
          retention-days: 7

      - name: Annotate PR with test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Integration Tests
          path: backend/build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  # 4. PLAYWRIGHT E2E TESTS
  #
  # Spring profile: default → application.yml
  # Schema used:            riskmanagement     (the real app schema)
  # DataInitializer seeds demo data on first start.
  # ────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: "E2E Tests — Playwright (Chromium)"
    runs-on: ubuntu-latest
    needs: [integration-tests]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Java + backend ──────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew
        working-directory: backend

      - name: Create riskmanagement schema
        run: |
          PGPASSWORD=${{ env.DB_PASSWORD }} psql \
            -h localhost -U ${{ env.DB_USERNAME }} \
            -c "CREATE SCHEMA IF NOT EXISTS riskmanagement;"

      - name: Start backend (background)
        run: ./gradlew bootRun --no-daemon &
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: default
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_USERNAME: ${{ env.DB_USERNAME }}

      - name: Wait for backend to be ready (port 8080)
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/api/loans > /dev/null 2>&1; then
              echo "Backend is up after ${i} attempts."; exit 0
            fi
            echo "  attempt $i — sleeping 5s"; sleep 5
          done
          echo "Backend did not start in time!" && exit 1

      # ── Node + frontend ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start Angular dev server (background)
        run: npx ng serve --port 4200 &
        working-directory: frontend

      - name: Wait for Angular dev server to be ready (port 4200)
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4200 > /dev/null 2>&1; then
              echo "Frontend is up after ${i} attempts."; exit 0
            fi
            echo "  attempt $i — sleeping 5s"; sleep 5
          done
          echo "Angular dev server did not start in time!" && exit 1

      # ── Run tests ────────────────────────────────────────────────────────────
      - name: Run Playwright E2E tests
        run: npx playwright test
        working-directory: frontend
        env:
          CI: true

      # ── Artefacts ────────────────────────────────────────────────────────────
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces / screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # 5. DEPLOY TO AZURE CONTAINER APPS  (main branch pushes only)
  #
  # Required GitHub Actions secrets:
  #   AZURE_CREDENTIALS   — Service principal JSON from azure-setup.sh
  #                         (az ad sp create-for-rbac --sdk-auth output)
  #   AZURE_ACR_NAME      — ACR instance name, e.g. riskmanagementacr
  #
  # Run azure-setup.sh once to provision infrastructure and generate credentials.
  # ────────────────────────────────────────────────────────────────────────────
  deploy-azure:
    name: "Deploy → Azure Container Apps"
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      RESOURCE_GROUP: riskmanagement-rg
      BACKEND_APP:    rm-backend
      FRONTEND_APP:   rm-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Authenticate to ACR using the service principal from AZURE_CREDENTIALS.
      # Container Apps pull images at runtime via the managed identity (AcrPull),
      # which chains to DefaultAzureCredential inside the Azure SDK.
      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: Build and push backend image
        run: |
          IMAGE=${{ secrets.AZURE_ACR_NAME }}.azurecr.io/backend:${{ github.sha }}
          docker build -t "$IMAGE" ./backend
          docker tag  "$IMAGE" ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/backend:latest
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/backend --all-tags

      - name: Build and push frontend image
        run: |
          IMAGE=${{ secrets.AZURE_ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
          docker build -t "$IMAGE" ./frontend
          docker tag  "$IMAGE" ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/frontend:latest
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/frontend --all-tags

      - name: Deploy backend to Container Apps
        run: |
          az containerapp update \
            --name "$BACKEND_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ secrets.AZURE_ACR_NAME }}.azurecr.io/backend:${{ github.sha }}"

      - name: Get backend URL
        id: backend-url
        run: |
          FQDN=$(az containerapp show \
            --name "$BACKEND_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend to Container Apps
        run: |
          az containerapp update \
            --name "$FRONTEND_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ secrets.AZURE_ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}" \
            --set-env-vars "BACKEND_URL=${{ steps.backend-url.outputs.url }}"

      - name: Print deployment URLs
        run: |
          FQDN=$(az containerapp show \
            --name "$FRONTEND_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "  App → https://${FQDN}"
          echo "  API → ${{ steps.backend-url.outputs.url }}"
          echo "╚══════════════════════════════════════════════════╝"
