# ──────────────────────────────────────────────────────────────────────────────
# cloudbuild.yaml — GCP Cloud Build pipeline
#
# Builds backend + frontend Docker images, pushes to Artifact Registry,
# then deploys both to Cloud Run (backend first, then frontend with the
# backend's live URL injected as BACKEND_URL).
#
# Required substitution variables (set in Cloud Build trigger or passed via
# gcloud builds submit --substitutions=...):
#
#   _REGION            GCP region, e.g. us-central1
#   _BACKEND_SERVICE   Cloud Run service name for backend,  e.g. rm-backend
#   _FRONTEND_SERVICE  Cloud Run service name for frontend, e.g. rm-frontend
#   _REGISTRY          Artifact Registry hostname, e.g. us-central1-docker.pkg.dev
#   _REPO              Artifact Registry repo name, e.g. riskmanagement
#   _CLOUD_SQL_INSTANCE Full connection name: PROJECT:REGION:INSTANCE
#   _DB_URL            Full JDBC URL using Cloud SQL socket factory
#   _DB_USERNAME       Database user, e.g. postgres
#   _DB_PASSWORD       Database password  (use Secret Manager in production)
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION:            us-central1
  _BACKEND_SERVICE:   rm-backend
  _FRONTEND_SERVICE:  rm-frontend
  _REGISTRY:          us-central1-docker.pkg.dev
  _REPO:              riskmanagement
  _DB_USERNAME:       postgres

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8    # faster builds, important for Gradle + npm

steps:

  # ── 1. Build backend image ──────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - $_REGISTRY/$PROJECT_ID/$_REPO/backend:$COMMIT_SHA
      - -t
      - $_REGISTRY/$PROJECT_ID/$_REPO/backend:latest
      - ./backend

  # ── 2. Build frontend image ─────────────────────────────────────────────────
  # BACKEND_URL is NOT baked into the image — it is injected at container start
  # by docker-entrypoint.sh so the same image works everywhere.
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - -t
      - $_REGISTRY/$PROJECT_ID/$_REPO/frontend:$COMMIT_SHA
      - -t
      - $_REGISTRY/$PROJECT_ID/$_REPO/frontend:latest
      - ./frontend

  # ── 3. Push both images ─────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: [build-backend]
    args: [push, --all-tags, $_REGISTRY/$PROJECT_ID/$_REPO/backend]

  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: [build-frontend]
    args: [push, --all-tags, $_REGISTRY/$PROJECT_ID/$_REPO/frontend]

  # ── 4. Deploy backend to Cloud Run ──────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_BACKEND_SERVICE
      - --image=$_REGISTRY/$PROJECT_ID/$_REPO/backend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=1
      - --add-cloudsql-instances=$_CLOUD_SQL_INSTANCE
      - --set-env-vars=DB_URL=$_DB_URL,DB_USERNAME=$_DB_USERNAME,DB_PASSWORD=$_DB_PASSWORD

  # ── 5. Retrieve backend URL ─────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: get-backend-url
    waitFor: [deploy-backend]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services describe $_BACKEND_SERVICE \
          --region=$_REGION \
          --format='value(status.url)' > /workspace/backend_url.txt
        echo "Backend URL: $(cat /workspace/backend_url.txt)"

  # ── 6. Deploy frontend to Cloud Run ─────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: [push-frontend, get-backend-url]
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        gcloud run deploy $_FRONTEND_SERVICE \
          --image=$_REGISTRY/$PROJECT_ID/$_REPO/frontend:$COMMIT_SHA \
          --region=$_REGION \
          --platform=managed \
          --allow-unauthenticated \
          --memory=256Mi \
          --cpu=1 \
          --min-instances=0 \
          --set-env-vars="BACKEND_URL=$$BACKEND_URL"

  # ── 7. Print live URLs ───────────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: print-urls
    waitFor: [deploy-frontend]
    entrypoint: bash
    args:
      - -c
      - |
        FRONTEND_URL=$(gcloud run services describe $_FRONTEND_SERVICE \
          --region=$_REGION --format='value(status.url)')
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        echo ""
        echo "╔══════════════════════════════════════════════════╗"
        echo "  App     → $$FRONTEND_URL"
        echo "  API     → $$BACKEND_URL"
        echo "╚══════════════════════════════════════════════════╝"

images:
  - $_REGISTRY/$PROJECT_ID/$_REPO/backend:$COMMIT_SHA
  - $_REGISTRY/$PROJECT_ID/$_REPO/frontend:$COMMIT_SHA
